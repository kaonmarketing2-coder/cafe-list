<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface2: #f3f1ee;
    --border: #e8e5e0;
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #a09d98;
    --accent: #c8622a;
    --accent-light: #fdf0e8;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .site-sub {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 1.5rem;
  }

  /* Stats */
  .stats {
    display: flex;
    justify-content: center;
    gap: 0;
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
    flex-wrap: wrap;
  }
  .stat {
    padding: 0 2rem;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Tabs */
  .tabs-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tabs {
    display: flex;
    overflow-x: auto;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1rem;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 14px 16px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    font-weight: 400;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* Grid */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }
  .result-count {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 1.25rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    border-color: #d4cfc9;
  }
  .card.has-img { cursor: pointer; }

  /* Image strip */
  .img-strip {
    width: 100%;
    height: 170px;
    display: flex;
    gap: 2px;
    overflow: hidden;
    background: var(--surface2);
    flex-shrink: 0;
    position: relative;
  }
  .img-strip img {
    flex: 1;
    object-fit: cover;
    min-width: 0;
    display: block;
    transition: transform 0.3s;
  }
  .card:hover .img-strip img { transform: scale(1.03); }
  .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: var(--surface2);
  }
  .img-count-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 99px;
    backdrop-filter: blur(4px);
  }
  .photo-hint {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .card.has-img:hover .photo-hint { background: rgba(0,0,0,0.12); }
  .photo-hint-text {
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 99px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card.has-img:hover .photo-hint-text { opacity: 1; }

  /* Card body */
  .card-body { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .cafe-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .cafe-tag { font-size: 11px; padding: 3px 9px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .tag-solo { background: #eaf3de; color: #3b6d11; }
  .tag-together { background: #e6f1fb; color: #185fa5; }
  .tag-both { background: #fdf0e8; color: #994018; }

  .location { font-size: 12px; color: var(--text2); display: flex; gap: 5px; line-height: 1.5; }
  .menus { display: flex; flex-wrap: wrap; gap: 5px; }
  .menu-pill { font-size: 11px; background: var(--surface2); color: var(--text2); padding: 3px 9px; border-radius: 99px; }
  .quote {
    font-size: 12px; color: var(--text2); line-height: 1.7;
    border-left: 2px solid #e0d8d0; padding-left: 10px; font-style: italic;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border); padding-top: 10px; margin-top: auto;
  }
  .recommender { display: flex; align-items: center; gap: 8px; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .rec-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .rec-team { font-size: 11px; color: var(--text3); }
  .time-badge { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 140px; }
  .time-chip { font-size: 11px; background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 99px; white-space: nowrap; }

  /* Lightbox */
  .lb {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 9, 8, 0.92);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 1rem;
  }
  .lb.open { display: flex; }
  .lb-close {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.25); }
  .lb-imgs {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    max-width: 960px;
    width: 100%;
    flex-wrap: wrap;
  }
  .lb-imgs img {
    max-height: 62vh;
    max-width: calc(33.3% - 8px);
    min-width: 120px;
    object-fit: contain;
    border-radius: 10px;
    flex: 1;
  }
  .lb-info { text-align: center; color: #fff; }
  .lb-info strong { font-size: 16px; font-weight: 500; display: block; margin-bottom: 4px; }
  .lb-info span { font-size: 13px; opacity: 0.6; }

  /* Rating */
  .rating-row { display: flex; align-items: center; gap: 7px; }
  .stars { display: flex; gap: 2px; }
  .star { font-size: 13px; line-height: 1; }
  .star.full { color: #f5a623; }
  .star.half { color: #f5a623; opacity: 0.5; }
  .star.empty { color: #ddd; }
  .rating-num { font-size: 13px; font-weight: 700; color: var(--text); }
  .rating-src { font-size: 11px; color: var(--text3); }
  .rating-none { font-size: 12px; color: var(--text3); }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
    font-size: 15px;
  }

  @media (max-width: 600px) {
    .stats { gap: 1rem; }
    .stat { border-right: none; padding: 0 1rem; }
    .grid { grid-template-columns: 1fr; }
    .lb-imgs img { max-width: 100%; }
  }
</style>
</head>

    recs: [{ name: '유정하', team: '시스템 2파트' }],
    solo: true, together: true, times: ['주말'], imgs: [],
    rating: 3.8
  },
];

const categories = [
  { key: 'all', label: '전체' },
  { key: 'morning', label: '☀️ 출근 전' },
  { key: 'lunch', label: '🍱 점심시간' },
  { key: 'afternoon', label: '☕ 오후' },
  { key: 'after', label: '🌙 퇴근 후' },
  { key: 'weekend', label: '🌿 주말' },
  { key: 'solo', label: '🎧 혼자' },
  { key: 'together', label: '👥 동료와' },
  { key: 'photo', label: '📷 사진 있음' },
];

let current = 'all';

function matches(cafe, key) {
  if (key === 'all') return true;
  if (key === 'morning') return cafe.times.includes('출근 전');
  if (key === 'lunch') return cafe.times.includes('점심');
  if (key === 'afternoon') return cafe.times.includes('오후');
  if (key === 'after') return cafe.times.includes('퇴근 후');
  if (key === 'weekend') return cafe.times.includes('주말');
  if (key === 'solo') return cafe.solo;
  if (key === 'together') return cafe.together;
  if (key === 'photo') return cafe.imgs && cafe.imgs.length > 0;
  return true;
}

function tagInfo(cafe) {
  if (cafe.solo && cafe.together) return { cls: 'tag-both', label: '혼자도 동료와도' };
  if (cafe.solo) return { cls: 'tag-solo', label: '혼자 조용히' };
  return { cls: 'tag-together', label: '동료와 함께' };
}

function openLightbox(cafe) {
  document.getElementById('lb-imgs').innerHTML =
    cafe.imgs.map(u => `<img src="${u}" alt="${cafe.name}">`).join('');
  document.getElementById('lb-info').innerHTML =
    `<strong>${cafe.name}</strong><span>📷 ${cafe.imgs.length}장의 사진 · 클릭 밖 또는 ✕ 버튼으로 닫기</span>`;
  document.getElementById('lb').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lb').classList.remove('open');
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb').addEventListener('click', e => {
  if (e.target === document.getElementById('lb')) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function renderStars(rating) {
  if (rating === null) return `<span class="rating-none">카카오맵 정보 없음</span>`;
  let html = '<div class="stars">';
  for (let i = 1; i <= 5; i++) {
    if (rating >= i) html += '<span class="star full">★</span>';
    else if (rating >= i - 0.5) html += '<span class="star half">★</span>';
    else html += '<span class="star empty">★</span>';
  }
  html += '</div>';
  const color = rating >= 4.5 ? '#e07b2a' : rating >= 3.5 ? '#888' : '#aaa';
  return `<div class="rating-row">${html}<span class="rating-num" style="color:${color}">${rating.toFixed(1)}</span><span class="rating-src">카카오맵</span></div>`;
}

function renderCard(cafe) {
  const r = cafe.recs[0];
  const col = ac(r.name);
  const t = tagInfo(cafe);
  const extra = cafe.recs.length > 1
    ? ` <span style="font-size:11px;color:var(--text3);">외 ${cafe.recs.length - 1}명</span>` : '';
  const chips = cafe.times.slice(0, 3).map(t => `<span class="time-chip">${t}</span>`).join('');
  const pills = cafe.menu.slice(0, 3).map(m => `<span class="menu-pill">${m}</span>`).join('');
  const hasImg = cafe.imgs && cafe.imgs.length > 0;

  let imgStrip;
  if (hasImg) {
    const imgTags = cafe.imgs.slice(0, 3).map(u =>
      `<img src="${u}" alt="${cafe.name}" loading="lazy">`
    ).join('');
    const badge = cafe.imgs.length > 1 ? `<span class="img-count-badge">📷 ${cafe.imgs.length}</span>` : '';
    imgStrip = `<div class="img-strip">${imgTags}${badge}<div class="photo-hint"><span class="photo-hint-text">사진 크게 보기</span></div></div>`;
  } else {
    imgStrip = `<div class="img-strip"><div class="img-placeholder">☕</div></div>`;
  }

  const card = document.createElement('div');
  card.className = 'card' + (hasImg ? ' has-img' : '');
  card.innerHTML = `
    ${imgStrip}
    <div class="card-body">
      <div class="card-top">
        <div class="cafe-name">${cafe.name}</div>
        <span class="cafe-tag ${t.cls}">${t.label}</span>
      </div>
      <div class="location">📍 ${cafe.location}</div>
      <div class="menus">${pills}</div>
      <div class="quote">${cafe.quote}</div>
      ${renderStars(cafe.rating)}
      <div class="card-footer">
        <div class="recommender">
          <div class="avatar" style="background:${col.bg};color:${col.text}">${r.name[0]}</div>
          <div>
            <div class="rec-name">${r.name}${extra}</div>
            <div class="rec-team">${r.team}</div>
          </div>
        </div>
        <div class="time-badge">${chips}</div>
      </div>
    </div>`;

  if (hasImg) {
    card.addEventListener('click', () => openLightbox(cafe));
  }
  return card;
}

function render() {
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('result-count');
  grid.innerHTML = '';
  const filtered = cafes.filter(c => matches(c, current));
  countEl.textContent = `${filtered.length}개 카페`;
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">해당 조건의 카페가 없어요.</div>';
    return;
  }
  filtered.forEach(c => grid.appendChild(renderCard(c)));
}

function setTab(key) {
  current = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  render();
}

const tabsEl = document.getElementById('tabs');
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (cat.key === 'all' ? ' active' : '');
  btn.dataset.key = cat.key;
  btn.textContent = cat.label;
  btn.addEventListener('click', () => setTab(cat.key));
  tabsEl.appendChild(btn);
});

render();
</script>
</body>
</html>
